name: CI

on:
    push:
        branches: ["**"]
    pull_request:
        branches: ["**"]

permissions:
    contents: read

jobs:
    cli:
        name: CLI (Go)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-go@v5
              with:
                  go-version: "1.24"
                  cache: true

            - name: Vet
              run: go vet ./...

            - name: Format check
              run: |
                  fmt_out="$(gofmt -l .)"
                  if [ -n "$fmt_out" ]; then
                    echo "The following files are not gofmt'd:"
                    echo "$fmt_out"
                    exit 1
                  fi

            - name: Test
              run: go test ./... -race -cover

            - name: Build (all platforms)
              run: |
                  set -e
                  for target in "linux amd64" "linux arm64" "darwin amd64" "darwin arm64" "windows amd64"; do
                    set -- $target
                    os=$1; arch=$2
                    ext=""
                    if [ "$os" = "windows" ]; then ext=".exe"; fi
                    echo "Building $os/$arch"
                    GOOS=$os GOARCH=$arch go build -o "dist/brht-$os-$arch$ext" ./cmd/brht
                  done

            - name: Upload build artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: brht-binaries
                  path: dist/
